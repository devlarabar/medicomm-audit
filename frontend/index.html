<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediComm Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen">
    <div class="max-w-3xl mx-auto px-4 py-10">

      <h1 class="text-2xl font-bold mb-1">MediComm Audit</h1>
      <p class="text-gray-500 mb-8 text-sm">
        Analyze doctor-patient conversations for communication risks and quality.
      </p>

      <!-- Input -->
      <section class="mb-6">
        <label for="conversation" class="block text-sm font-medium mb-2">
          Conversation
        </label>
        <textarea
          id="conversation"
          rows="10"
          placeholder="Paste a doctor-patient conversation here..."
          class="w-full rounded-lg border border-gray-300 p-3 text-sm font-mono
                 focus:outline-none focus:ring-2 focus:ring-blue-500"
        ></textarea>
        <button
          id="analyze-btn"
          class="mt-3 px-5 py-2 bg-blue-600 text-white text-sm font-medium
                 rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Analyze
        </button>
        <p id="error-msg" class="mt-2 text-red-500 text-sm hidden"></p>
      </section>

      <!-- Results -->
      <div id="results" class="hidden space-y-6">

        <!-- Summary -->
        <section class="bg-white rounded-lg border border-gray-200 p-5">
          <h2 class="text-base font-semibold mb-3">Summary</h2>
          <p id="summary-text" class="text-sm text-gray-700 leading-relaxed"></p>
        </section>

        <!-- Conversation Timeline -->
        <section class="bg-white rounded-lg border border-gray-200 p-5">
          <h2 class="text-base font-semibold mb-3">Conversation Timeline</h2>
          <ol id="conversation-timeline" class="space-y-1"></ol>
        </section>

        <!-- Risks -->
        <section class="bg-white rounded-lg border border-gray-200 p-5">
          <h2 class="text-base font-semibold mb-3">Risk Analysis</h2>
          <div id="risk-list" class="space-y-4"></div>
        </section>

        <!-- Quality Scores -->
        <section class="bg-white rounded-lg border border-gray-200 p-5">
          <h2 class="text-base font-semibold mb-3">Communication Quality</h2>
          <div id="quality-scores" class="grid grid-cols-2 gap-3 mb-4"></div>
          <p id="quality-feedback" class="text-sm text-gray-700 leading-relaxed"></p>
        </section>

        <!-- Metrics Dashboard -->
        <section id="metrics-panel" class="bg-blue-50 rounded-lg border border-blue-200 p-5 hidden">
          <h2 class="text-base font-semibold mb-1">Session Metrics</h2>
          <p id="metrics-count" class="text-xs text-gray-500 mb-3"></p>
          <div id="metrics-scores" class="grid grid-cols-2 gap-3"></div>
        </section>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
