<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediComm Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      textarea { resize: none; }
    </style>
  </head>
  <body class="h-screen overflow-hidden flex flex-col bg-slate-50 text-slate-900">

    <!-- Header -->
    <header class="flex-shrink-0 bg-white border-b border-slate-200 px-5 py-3 flex items-center gap-3">
      <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-semibold text-slate-900 leading-tight">MediComm Audit</h1>
        <p class="text-xs text-slate-400">Clinical communication analysis</p>
      </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex overflow-hidden">

      <!-- Left: input panel -->
      <aside class="w-80 flex-shrink-0 flex flex-col bg-white border-r border-slate-200 p-4 gap-3">
        <label for="conversation"
          class="text-xs font-semibold text-slate-400 uppercase tracking-widest">
          Conversation
        </label>
        <textarea
          id="conversation"
          placeholder="Paste a doctor-patient conversation here..."
          class="flex-1 w-full rounded-lg border border-slate-200 p-3 text-xs font-mono
                 text-slate-700 bg-slate-50 focus:outline-none focus:ring-2
                 focus:ring-blue-500 focus:border-transparent leading-relaxed"
        ></textarea>
        <p id="error-msg" class="text-red-500 text-xs hidden"></p>
        <button
          id="analyze-btn"
          class="w-full py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg
                 hover:bg-blue-700 active:bg-blue-800 disabled:opacity-40
                 disabled:cursor-not-allowed transition-colors duration-150"
        >
          Analyze
        </button>
      </aside>

      <!-- Right: results panel -->
      <div class="flex-1 flex flex-col overflow-hidden p-4 gap-3">

        <!-- Empty state -->
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-center">
          <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center mb-4">
            <svg class="w-6 h-6 text-slate-300" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <p class="text-sm font-medium text-slate-400">No analysis yet</p>
          <p class="text-xs text-slate-300 mt-1">Paste a conversation and click Analyze</p>
        </div>

        <!-- Results (hidden until first analysis) -->
        <div id="results" class="hidden flex-col gap-3 overflow-hidden min-h-0 flex-1">

          <!-- Row 1: Summary -->
          <section class="flex-shrink-0 bg-white rounded-xl border border-slate-100
                          shadow-sm px-5 py-4">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">
              Summary
            </h2>
            <p id="summary-text" class="text-sm text-slate-700 leading-relaxed"></p>
          </section>

          <!-- Row 2: Quality + Metrics -->
          <div class="flex-shrink-0 flex gap-3">
            <section class="flex-1 bg-white rounded-xl border border-slate-100 shadow-sm px-5 py-4">
              <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">
                Quality
              </h2>
              <div id="quality-scores" class="grid grid-cols-2 gap-x-6 gap-y-3"></div>
              <p id="quality-feedback" class="text-xs text-slate-500 mt-3 leading-relaxed"></p>
            </section>
            <section id="metrics-panel"
              class="hidden flex-1 bg-white rounded-xl border border-slate-100 shadow-sm px-5 py-4">
              <div class="flex items-baseline justify-between mb-3">
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">
                  Session Avg
                </h2>
                <p id="metrics-count" class="text-xs text-slate-400"></p>
              </div>
              <div id="metrics-scores" class="grid grid-cols-2 gap-x-6 gap-y-3"></div>
            </section>
          </div>

          <!-- Row 3: Timeline + Risks -->
          <div class="flex-1 flex gap-3 overflow-hidden min-h-0">
            <section class="flex-1 bg-white rounded-xl border border-slate-100
                            shadow-sm px-5 py-4 overflow-y-auto">
              <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">
                Timeline
              </h2>
              <ol id="conversation-timeline" class="space-y-0.5"></ol>
            </section>
            <section class="flex-1 bg-white rounded-xl border border-slate-100
                            shadow-sm px-5 py-4 overflow-y-auto">
              <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">
                Risk Analysis
              </h2>
              <div id="risk-list" class="space-y-3"></div>
            </section>
          </div>

        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
